general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.15
    outer_color = rgba(6c13b6ff)
    inner_color = rgba(020647cc)
    font_color = rgb(ffffff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgba(6c13b6ff)
    fail_color = rgba(ff5555ff)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(ffffffff)
    font_size = 72
    font_family = JetBrains Mono Bold

    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(ffffffcc)
    font_size = 18
    font_family = JetBrains Mono

    position = 0, 120
    halign = center
    valign = center
}
